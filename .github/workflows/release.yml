name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgtest-dev libssl-dev

      - name: Build with build.sh
        run: bash ./build.sh

      - name: Package release binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          mapfile -t release_files < <(find Debug -maxdepth 1 -type f -executable | sort)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No built binaries found in Debug/"
            exit 1
          fi

          cp "${release_files[@]}" dist/
          (
            cd dist
            sha256sum ./* > SHA256SUMS
          )

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libcppstaacks-build-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: libcppstaacks-build-${{ github.sha }}
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --generate-notes \
              --title "$tag"
          fi
